<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dodaj osobę</title>
</head>
<body>

<h1>Dodaj nową osobę</h1>

<form action="#" th:action="@{/people}" th:object="${person}" method="post">

    <label>Imię:</label>
    <input type="text" th:field="*{firstName}" />
    <br/><br/>

    <label>Nazwisko:</label>
    <input type="text" th:field="*{familyName}" />
    <br/><br/>

    <button type="submit">Dodaj</button>
</form>

<p>
    <a th:href="@{/people}">Powrót do listy</a>
</p>

</body>
</html>
